<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Atualizado</title>

<style>
/* --- AJUSTE 3D REFINADO --- */

.tree img{
  filter: contrast(1.02) brightness(.99);
}

/* sombra apenas na raiz */
.tree::before{
  content:"";
  position:absolute;
  left:50%;
  bottom:8%;
  transform:translateX(-50%);
  width:42%;
  height:18%;
  background: radial-gradient(
    ellipse at center,
    rgba(0,0,0,.22) 0%,
    rgba(0,0,0,.12) 40%,
    rgba(0,0,0,0) 70%
  );
  filter: blur(18px);
  opacity:.9;
  pointer-events:none;
}

/* respiração com sombra controlada */
@keyframes treeBreathShadow{
  0%,100%{
    filter:
      drop-shadow(0 14px 28px rgba(0,0,0,.20))
      brightness(.99) contrast(1.02);
  }
  50%{
    filter:
      drop-shadow(0 20px 48px rgba(0,0,0,.26))
      brightness(1.01) contrast(1.03);
  }
}
</style>
</head>

<body>
<div class="tree">
  <img src="imagens/Tree ring hero.webp">
</div>
</body>
</html>
